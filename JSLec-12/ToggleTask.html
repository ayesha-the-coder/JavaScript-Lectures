<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #blub{
            background-color: yellow;
            height: 200px;
            width: 200px;
        }
        .off{
            background-color: white !important;
        }
    </style>
</head>
<body>
    <div id="blub"></div>
    <script>
        setInterval(function(){
            document.getElementById("blub").classList.toggle("off");

        },300)
    </script>
    
</body>
</html>
