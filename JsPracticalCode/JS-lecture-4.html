<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Loops</title>
</head>

<body>
    <script>
        // Examlpe for loop

        for (let i = 1; i <= 5; i++) {
            document.write(i + "<br>");
        }

        // Examlpe  While loop
        let a = 1;
        while (a <= 10) {
            document.write("Hello my name is Ali");
            a++;
        }

         // Examlpe  Do While loop

        let x = 1;
        do {
            document.write("Hello Every One <br>")
            x++;

        } while (x <= 10);

    </script>

</body>

</html>
